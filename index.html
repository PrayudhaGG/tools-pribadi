<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pra Downloader</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #050515, #000);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            color: #00ccff;
            margin-bottom: 5px;
        }

        .header p {
            color: #88aaff;
            font-size: 0.85rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 50px;
        }

        .tab {
            background: rgba(10,10,30,0.8);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #aaccff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .tab.active {
            background: #0066ff;
            color: white;
        }

        .tab:hover:not(.active) {
            background: rgba(0,100,255,0.3);
        }

        /* Panel */
        .panel {
            display: none;
            background: rgba(5,5,20,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0,150,255,0.3);
        }

        .panel.active {
            display: block;
        }

        /* Form */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #88ccff;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #3399ff;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #00ccff;
        }

        button {
            background: #0066ff;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            background: #0088ff;
            transform: scale(1.02);
        }

        .btn-green {
            background: #00aa44;
        }

        .btn-green:hover {
            background: #00cc55;
        }

        /* Preview Card */
        .preview-card {
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            border-left: 3px solid #00ccff;
        }

        .preview-flex {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #3399ff;
        }

        .preview-info {
            flex: 1;
        }

        .preview-title {
            color: white;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .preview-meta {
            color: #88aaff;
            font-size: 12px;
            margin: 5px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .download-link {
            display: inline-block;
            margin-top: 10px;
            background: #00aa44;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 13px;
        }

        .error {
            color: #ff8888;
            background: rgba(255,0,0,0.1);
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .success {
            color: #88ffaa;
            background: rgba(0,255,64,0.1);
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #88aaff;
        }

        /* Result Item */
        .result-item {
            background: rgba(10,10,24,0.8);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .result-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            color: white;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .result-stats {
            color: #88aaff;
            font-size: 11px;
            display: flex;
            gap: 10px;
        }

        /* Modal Chat */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 1000;
        }

        .modal.active {
            display: block;
        }

        .modal-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid #3399ff;
        }

        .modal-header h3 {
            color: #00ccff;
        }

        .close {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(0,100,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-input-area {
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid #3399ff;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #3399ff;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            max-width: 80%;
        }

        .message-user {
            background: rgba(0,100,255,0.2);
            margin-left: auto;
            text-align: right;
        }

        .message-ai {
            background: rgba(0,100,255,0.1);
            border-left: 2px solid #3399ff;
        }

        .message-sender {
            font-size: 11px;
            color: #88aaff;
            margin-bottom: 5px;
        }

        .message-text {
            color: white;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .tab { padding: 8px 15px; font-size: 12px; }
            .preview-img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fa-solid fa-download"></i> Pra Downloader</h1>
        <p>Download Instagram • TikTok • YouTube | Search TikTok | Cek NIK | AI Chat</p>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="download"><i class="fa-solid fa-cloud-arrow-down"></i> Download</button>
        <button class="tab" data-tab="search"><i class="fa-brands fa-tiktok"></i> Search</button>
        <button class="tab" data-tab="nik"><i class="fa-regular fa-id-card"></i> Cek NIK</button>
        <button class="tab" id="openChatBtn"><i class="fa-regular fa-message"></i> AI Chat</button>
    </div>

    <!-- Panel Download -->
    <div id="downloadPanel" class="panel active">
        <div class="input-group">
            <label><i class="fa-regular fa-link"></i> Platform</label>
            <select id="platform">
                <option value="instagram">Instagram</option>
                <option value="tiktok">TikTok</option>
                <option value="youtube">YouTube (MP4)</option>
            </select>
        </div>
        <div class="input-group">
            <label><i class="fa-regular fa-link"></i> URL</label>
            <input type="text" id="urlInput" placeholder="Masukkan URL...">
        </div>
        <button id="processBtn"><i class="fa-solid fa-magnifying-glass"></i> Proses</button>
        <div id="downloadResult"></div>
    </div>

    <!-- Panel Search -->
    <div id="searchPanel" class="panel">
        <div class="input-group">
            <label><i class="fa-brands fa-tiktok"></i> Cari Video TikTok</label>
            <input type="text" id="searchInput" placeholder="Kata kunci...">
        </div>
        <button id="searchBtn"><i class="fa-solid fa-search"></i> Cari</button>
        <div id="searchResult"></div>
    </div>

    <!-- Panel NIK -->
    <div id="nikPanel" class="panel">
        <div class="input-group">
            <label><i class="fa-regular fa-id-card"></i> NIK (16 digit)</label>
            <input type="text" id="nikInput" placeholder="3201234567890001" maxlength="16">
        </div>
        <button id="nikBtn"><i class="fa-solid fa-check-circle"></i> Cek NIK</button>
        <div id="nikResult"></div>
    </div>
</div>

<!-- Modal AI Chat -->
<div id="chatModal" class="modal">
    <div class="modal-container">
        <div class="modal-header">
            <h3><i class="fa-regular fa-robot"></i> AI Chat</h3>
            <button class="close" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message message-ai">
                <div class="message-sender"><i class="fa-regular fa-robot"></i> AI</div>
                <div class="message-text">Halo! Ada yang bisa saya bantu?</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Tanyakan sesuatu...">
            <button id="sendChatBtn"><i class="fa-regular fa-paper-plane"></i> Kirim</button>
        </div>
    </div>
</div>

<script>
    const API = "https://next-api-v1.vercel.app";

    // TAB SWITCH
    document.querySelectorAll('.tab').forEach(btn => {
        if (btn.id === 'openChatBtn') return;
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab + 'Panel').classList.add('active');
        });
    });

    // MODAL CHAT
    const modal = document.getElementById('chatModal');
    document.getElementById('openChatBtn').onclick = () => {
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    };
    document.getElementById('closeModalBtn').onclick = () => {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    };
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    // AI CHAT
    async function sendChat() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;

        const chatDiv = document.getElementById('chatMessages');
        
        // User message
        chatDiv.innerHTML += `
            <div class="message message-user">
                <div class="message-sender"><i class="fa-regular fa-user"></i> Anda</div>
                <div class="message-text">${escapeHtml(msg)}</div>
            </div>
        `;
        input.value = '';
        chatDiv.scrollTop = chatDiv.scrollHeight;

        // Loading
        const loadId = 'load-' + Date.now();
        chatDiv.innerHTML += `
            <div class="message message-ai" id="${loadId}">
                <div class="message-sender"><i class="fa-regular fa-robot"></i> AI</div>
                <div class="message-text"><i class="fa-solid fa-spinner fa-spin"></i> Mengetik...</div>
            </div>
        `;
        chatDiv.scrollTop = chatDiv.scrollHeight;

        try {
            const res = await fetch(`${API}/ai/gpt4?prompt=${encodeURIComponent(msg)}`);
            const data = await res.json();
            document.getElementById(loadId).remove();
            
            chatDiv.innerHTML += `
                <div class="message message-ai">
                    <div class="message-sender"><i class="fa-regular fa-robot"></i> AI</div>
                    <div class="message-text">${escapeHtml(data.result || 'Maaf, error.')}</div>
                </div>
            `;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        } catch (err) {
            document.getElementById(loadId).remove();
            chatDiv.innerHTML += `
                <div class="message message-ai">
                    <div class="message-sender"><i class="fa-regular fa-robot"></i> AI</div>
                    <div class="message-text">Error: ${err.message}</div>
                </div>
            `;
        }
    }

    document.getElementById('sendChatBtn').onclick = sendChat;
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChat();
    });

    // DOWNLOAD MEDIA
    async function downloadMedia() {
        const platform = document.getElementById('platform').value;
        const url = document.getElementById('urlInput').value.trim();
        const resultDiv = document.getElementById('downloadResult');

        if (!url) {
            resultDiv.innerHTML = '<div class="error">Masukkan URL!</div>';
            return;
        }

        resultDiv.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Memproses...</div>';

        try {
            let endpoint = '';
            if (platform === 'instagram') endpoint = `${API}/download/instagram?url=${encodeURIComponent(url)}`;
            else if (platform === 'tiktok') endpoint = `${API}/download/tiktok?url=${encodeURIComponent(url)}`;
            else endpoint = `${API}/download/ytmp4?url=${encodeURIComponent(url)}`;

            const res = await fetch(endpoint);
            const data = await res.json();

            let downloadLink = data.download_url || data.link || data.result || data.url;
            if (!downloadLink && data.data) downloadLink = data.data.download_url;
            
            let title = data.title || data.video_title || 'Video';
            let thumbnail = data.thumbnail || data.cover || '';
            let author = data.author || data.creator || '';

            if (downloadLink) {
                resultDiv.innerHTML = `
                    <div class="preview-card">
                        <div class="preview-flex">
                            ${thumbnail ? `<img class="preview-img" src="${thumbnail}" onerror="this.style.display='none'">` : ''}
                            <div class="preview-info">
                                <div class="preview-title">${escapeHtml(title)}</div>
                                <div class="preview-meta">
                                    ${author ? `<span><i class="fa-regular fa-user"></i> ${escapeHtml(author)}</span>` : ''}
                                    <span><i class="fa-regular fa-circle-check"></i> ${platform}</span>
                                </div>
                                <a href="${downloadLink}" class="download-link" target="_blank"><i class="fa-solid fa-download"></i> Download</a>
                            </div>
                        </div>
                        <p style="font-size:11px; color:#88aaff; margin-top:10px; word-break:break-all;">${downloadLink}</p>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = '<div class="error">Link tidak ditemukan</div>';
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
    }

    // SEARCH TIKTOK
    async function searchTikTok() {
        const query = document.getElementById('searchInput').value.trim();
        const resultDiv = document.getElementById('searchResult');

        if (!query) {
            resultDiv.innerHTML = '<div class="error">Masukkan kata kunci!</div>';
            return;
        }

        resultDiv.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Mencari...</div>';

        try {
            const res = await fetch(`${API}/search/tiktok?q=${encodeURIComponent(query)}`);
            const data = await res.json();

            if (data.status && data.result && data.result.length > 0) {
                let html = '<div class="success">Ditemukan ' + data.result.length + ' video</div>';
                for (let v of data.result.slice(0, 10)) {
                    html += `
                        <div class="result-item">
                            ${v.cover ? `<img class="result-img" src="${v.cover}">` : ''}
                            <div class="result-info">
                                <div class="result-title">${escapeHtml(v.title?.substring(0, 60) || 'No title')}</div>
                                <div class="result-stats">
                                    <span><i class="fa-regular fa-heart"></i> ${formatNumber(v.digg_count)}</span>
                                    <span><i class="fa-regular fa-clock"></i> ${v.duration}s</span>
                                </div>
                                ${v.play ? `<a href="${v.play}" class="download-link" target="_blank" style="margin-top:5px; display:inline-block;">Tonton</a>` : ''}
                            </div>
                        </div>
                    `;
                }
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = '<div class="error">Tidak ada hasil</div>';
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
    }

    // CEK NIK
    async function cekNIK() {
        const nik = document.getElementById('nikInput').value.trim();
        const resultDiv = document.getElementById('nikResult');

        if (!nik || nik.length < 16) {
            resultDiv.innerHTML = '<div class="error">Masukkan NIK 16 digit!</div>';
            return;
        }

        resultDiv.innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Mengecek...</div>';

        try {
            const res = await fetch(`${API}/search/nik?q=${encodeURIComponent(nik)}`);
            const data = await res.json();

            if (data.status && data.result) {
                resultDiv.innerHTML = `
                    <div class="success">Data Ditemukan</div>
                    <pre style="background:#0a0a20; padding:12px; border-radius:10px; overflow-x:auto; font-size:11px; color:#ccddff; margin-top:10px;">${escapeHtml(JSON.stringify(data.result, null, 2))}</pre>
                `;
            } else {
                resultDiv.innerHTML = '<div class="error">NIK tidak ditemukan</div>';
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
    }

    function formatNumber(n) {
        if (!n) return '0';
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return n.toString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event Listeners
    document.getElementById('processBtn').onclick = downloadMedia;
    document.getElementById('searchBtn').onclick = searchTikTok;
    document.getElementById('nikBtn').onclick = cekNIK;
    
    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') downloadMedia();
    });
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchTikTok();
    });
    document.getElementById('nikInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') cekNIK();
    });
</script>
</body>
</html>
